name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - "**"
  schedule:
    - cron: '55 10 * * 0'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.10'
          cache: 'pip' # Safely caches dependencies

      - name: Install dependencies
        run: pip install -e .[lint]

      - name: Check style and syntax (Ruff)
        run: ruff check .

      - name: Check minimum Python version compatibility (Vermin)
        run: vermin --target=3.10- --no-parse-comments --no-tips j1939/

      - name: Run Pyright
        run: pyright

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: install dependencies
        run: pip3 install -e .[test]

      - name: Run tests
        run: pytest . --pyargs

  build_check:
    name: Verify Package Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@v7.0.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install build tools
        run: pip install build twine

      - name: Verify package build and metadata
        run: |
          python -m build
          python -m twine check dist/*